/span>(<span class="hljs-number">0</span>);<br><br>    <span class="hljs-comment">// Add initial edges to the priority queue</span><br>    <span class="hljs-keyword">for</span> &amp;(neighbor, cost) <span class="hljs-keyword">in</span> &amp;adj_list[<span class="hljs-number">0</span>] &#123;<br>        pq.<span class="hljs-title function_ invoke__">push</span>((<span class="hljs-title function_ invoke__">Reverse</span>(cost), neighbor, <span class="hljs-number">0</span>));<br>    &#125;<br><br>    <span class="hljs-keyword">while</span> visited.<span class="hljs-title function_ invoke__">len</span>() &lt; adj_list.<span class="hljs-title function_ invoke__">len</span>() &#123;<br>        <span class="hljs-keyword">if</span> pq.<span class="hljs-title function_ invoke__">is_empty</span>() &#123;<br>            <span class="hljs-comment">// Graph is not connected</span><br>            <span class="hljs-title function_ invoke__">return</span> (-<span class="hljs-number">1</span>, <span class="hljs-type">Vec</span>::<span class="hljs-title function_ invoke__">new</span>());<br>        &#125;<br><br>        <span class="hljs-keyword">let</span> (<span class="hljs-title function_ invoke__">Reverse</span>(cost), to, from) = pq.<span class="hljs-title function_ invoke__">pop</span>().<span class="hljs-title function_ invoke__">unwrap</span>();<br><br>        <span class="hljs-keyword">if</span> visited.<span class="hljs-title function_ invoke__">contains</span>(&amp;to) &#123;<br>            <span class="hljs-keyword">continue</span>;<br>        &#125;<br><br>        visited.<span class="hljs-title function_ invoke__">insert</span>(to);<br>        total_cost += cost;<br>        mst_edges.<span class="hljs-title function_ invoke__">push</span>((from, to, cost));<br><br>        <span class="hljs-comment">// Add new edges to the priority queue</span><br>        <span class="hljs-keyword">for</span> &amp;(neighbor, edge_cost) <span class="hljs-keyword">in</span> &amp;adj_list[t
